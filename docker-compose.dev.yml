version: '3.8'

# Development overrides: source builds, hot reload, debug mode, mock data
services:
  postgres-app:
    ports:
      - "5432:5432"

  postgres-airflow:
    ports:
      - "5433:5432"

  fastapi-app:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      FASTAPI_DEBUG: 'true'
      FASTAPI_LOG_LEVEL: DEBUG
      JMIE_USE_MOCK_SCRAPER: 'true'
    volumes:
      - ./api:/app
      - ./nlp:/app/nlp
      - ./db:/app/db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: 'http://localhost:8000'
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"

  airflow-scheduler:
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      JMIE_USE_MOCK_SCRAPER: 'true'
    volumes:
      - ./dags:/home/airflow/gitsync/dags
      - ./scraper:/home/airflow/gitsync/scraper
      - ./nlp:/home/airflow/gitsync/nlp
      - airflow_logs:/home/airflow/logs

  airflow-webui:
    volumes:
      - ./dags:/home/airflow/gitsync/dags
      - ./scraper:/home/airflow/gitsync/scraper
      - ./nlp:/home/airflow/gitsync/nlp
