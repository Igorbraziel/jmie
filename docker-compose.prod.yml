version: '3.8'

# Production overrides: registry images, restart policies, real data, prod credentials
services:
  postgres-app:
    restart: always
    image: postgres:15
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --max_connections=200"

  postgres-airflow:
    restart: always
    image: postgres:15

  qdrant:
    restart: always
    image: qdrant/qdrant:latest

  mlflow:
    restart: always
    image: ghcr.io/mlflow/mlflow:latest

  phoenix:
    restart: always
    image: arizephoenix/phoenix:latest

  airflow-scheduler:
    restart: always
    image: apache/airflow:2.8.0-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      JMIE_USE_MOCK_SCRAPER: 'false'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  airflow-webui:
    restart: always
    image: apache/airflow:2.8.0-python3.12
    environment:
      JMIE_USE_MOCK_SCRAPER: 'false'

  fastapi-app:
    restart: always
    image: ${GCP_REGION:-us-central1}-docker.pkg.dev/${GCP_PROJECT_ID}/jmie/api:latest
    environment:
      FASTAPI_DEBUG: 'false'
      FASTAPI_LOG_LEVEL: INFO
      JMIE_USE_MOCK_SCRAPER: 'false'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: always
    image: ${GCP_REGION:-us-central1}-docker.pkg.dev/${GCP_PROJECT_ID}/jmie/frontend:latest
    environment:
      NODE_ENV: production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
